lang en_US.UTF-8
keyboard us
timezone UTC

eula --agreed
firstboot --disable
selinux --enforcing
firewall --enabled --service=ssh

network --bootproto=dhcp --device=link --activate

rootpw --plaintext password

timezone Asia/Seoul --utc

zerombr
clearpart --all --initlabel
autopart --type=lvm

reboot

%packages
@^graphical-server-environment
%end