# --- POST-INSTALLATION: PREVENT PXE LOOP ---
%post

# 1. Identify the 4-digit UEFI boot number for the newly installed RHEL
RHEL_BOOTNUM=$(efibootmgr | grep -i "Red Hat" | grep -Eo 'Boot[0-9A-F]{4}' | head -n 1 | sed 's/Boot//')

if [ -n "$RHEL_BOOTNUM" ]; then
    # 2. Extract the current UEFI Boot Order
    CURRENT_ORDER=$(efibootmgr | grep "^BootOrder:" | awk '{print $2}')
    
    # 3. Safely strip the RHEL boot number from its current position in the list
    STRIPPED_ORDER=$(echo $CURRENT_ORDER | tr ',' '\n' | grep -v "^${RHEL_BOOTNUM}$" | paste -sd, -)
    
    # 4. Rewrite the NVRAM, forcing RHEL to be permanently #1, pushing everything else down
    efibootmgr -o ${RHEL_BOOTNUM},${STRIPPED_ORDER}
fi

%end

reboot