name: Deploy Python Function to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'Azure'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Function App is Started
        run: |
          az functionapp start --name 'rhel-ztp-composer-app' --resource-group '20260708_Azure_RHEL_ZTP'
          echo "Waiting 30 seconds for the host and storage to mount..."
          sleep 30

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'rhel-ztp-composer-app'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNC_PUBLISH_PROFILE }}